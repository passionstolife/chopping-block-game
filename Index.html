<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Chopping Block</title>
    <style>
        body {
            background-color: #0f172a;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .title {
            font-size: 24px;
            font-weight: bold;
            color: #fbbf24;
            margin-top: 10px;
        }
        .instructions {
            font-size: 13px;
            color: #94a3b8;
            background: rgba(0, 0, 0, 0.4);
            padding: 8px;
            border-radius: 8px;
            width: 90%;
            margin: 10px auto;
        }
        #stage-canvas {
            width: 100%;
            max-width: 320px;
            height: 300px;
            background-color: #38bdf8;
            position: relative;
            border: 2px solid #0284c7;
            overflow: hidden;
            border-radius: 8px;
            margin: 10px auto;
        }
        #player-sim {
            position: absolute;
            font-size: 32px;
            width: 32px;
            height: 32px;
            z-index: 10;
            left: 20px;
            bottom: 0;
            transition: transform 0.1s, left 0.1s, bottom 0.1s;
        }
        .platform {
            position: absolute;
            background-color: #b45309;
            border-top: 4px solid #d97706;
            height: 15px;
            border-radius: 2px;
        }
        .pantry-item {
            position: absolute;
            font-size: 24px;
            width: 24px;
            height: 24px;
            z-index: 5;
        }
        #kitchen-door {
            position: absolute;
            font-size: 36px;
            bottom: 0px;
            right: 10px;
            z-index: 4;
        }
        .controls {
            display: flex;
            gap: 10px;
            margin: 15px auto;
            justify-content: center;
        }
        .ctrl-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px #047857;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .ctrl-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px #047857;
        }
        .btn-action {
            background-color: #fbbf24;
            color: #000000;
            border: none;
            padding: 12px 24px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            margin: 5px;
        }
        .game-status-bar {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 320px;
            margin: 10px auto;
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="title">The Chopping Block</div>
    
    <div class="instructions" id="info">
        🎉 Success! You gathered the food and advanced to the next level!
    </div>

    <!-- Gameplay Area -->
    <div id="stage-canvas">
        <!-- Floating Food Ingredients -->
        <div id="item1" class="pantry-item" style="left: 80px; bottom: 120px; display: none;">🥩</div>
        <div id="item2" class="pantry-item" style="left: 180px; bottom: 70px; display: none;">🥦</div>
        
        <!-- Platforms -->
        <div class="platform" style="width: 80px; left: 60px; bottom: 90px;"></div>
        <div class="platform" style="width: 80px; left: 160px; bottom: 50px;"></div>

        <!-- Exit Door -->
        <div id="kitchen-door">🚪</div>

        <!-- Animated Player Character -->
        <div id="player-sim">🧑‍🍳</div>
    </div>

    <!-- D-Pad Controls -->
    <div class="controls">
        <button class="ctrl-btn" onclick="movePlayer(-20)">◀ Left</button>
        <button class="ctrl-btn" onclick="jumpPlayer()">▲ Jump</button>
        <button class="ctrl-btn" onclick="movePlayer(20)">Right ▶</button>
    </div>

    <!-- Bottom Actions -->
    <div style="margin-top: 10px;">
        <button class="btn-action" onclick="spinWheel()">🎰 Spin Basket</button>
        <button class="btn-action" style="background: #3b82f6; color: white;" onclick="restartGame()">🔄 Restart</button>
    </div>

    <script>
        let playerX = 20;
        let playerY = 0;
        let itemsCollected = 0;
        let totalItems = 2;
        let gameActive = true;

        const player = document.getElementById('player-sim');
        const infoText = document.getElementById('info');

        function restartGame() {
            playerX = 20;
            playerY = 0;
            itemsCollected = 0;
            gameActive = true;
            document.getElementById('item1').style.display = 'block';
            document.getElementById('item2').style.display = 'block';
            player.style.left = playerX + 'px';
            player.style.bottom = playerY + 'px';
            infoText.innerHTML = "🏃‍♂️ Find: 🥩 and 🥦! Run right to collect them!";
        }

        function spinWheel() {
            restartGame();
            infoText.innerHTML = "🎰 Mystery Basket loaded! Find: 🥩 and 🥦!";
        }

        function movePlayer(distance) {
            if (!gameActive) return;
            
            playerX = Math.max(0, Math.min(280, playerX + distance));
            player.style.left = playerX + 'px';

            if (distance > 0) {
                player.style.transform = "scaleX(1)";
            } else {
                player.style.transform = "scaleX(-1)";
            }

            checkCollisions();
        }

        function jumpPlayer() {
            if (!gameActive || playerY > 0) return;

            playerY = 110;
            player.style.bottom = playerY + 'px';

            setTimeout(() => {
                checkCollisions();
                playerY = 0;
                player.style.bottom = playerY + 'px';
                setTimeout(checkCollisions, 150);
            }, 300);
        }

        function checkCollisions() {
            if (document.getElementById('item1').style.display !== 'none' && playerX >= 50 && playerX <= 110 && playerY >= 70) {
                document.getElementById('item1').style.display = 'none';
                itemsCollected++;
            }
            if (document.getElementById('item2').style.display !== 'none' && playerX >= 150 && playerX <= 210 && playerY >= 40) {
                document.getElementById('item2').style.display = 'none';
                itemsCollected++;
            }

            if (playerX >= 240) {
                infoText.innerHTML = "🎉 Success! You gathered the food and advanced to the next level!";
                gameActive = false;
            }
        }
    </script>
</body>
</html>
