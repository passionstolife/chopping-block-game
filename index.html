<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Chopping Block</title>
    <style>
        body { background-color: #1a0f0a; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        #game-container { width: 360px; height: 640px; background-color: #2c1a11; border: 4px solid #4a2d1d; border-radius: 16px; display: flex; flex-direction: column; align-items: center; padding: 15px; box-sizing: border-box; position: relative; }
        .screen { width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: space-between; }
        .active { display: flex; }
        .title { font-size: 24px; font-weight: bold; color: #ffcc00; }
        .btn { background-color: #7acc4d; color: #1a330e; border: none; padding: 12px 24px; font-size: 18px; font-weight: bold; border-radius: 12px; cursor: pointer; box-shadow: 0 4px #559933; margin: 5px; }
        #avatar-preview { font-size: 80px; margin: 20px; }
        #wheel-display { font-size: 60px; margin: 20px; }
        .basket-box { display: flex; gap: 10px; font-size: 32px; background: #1a0f0a; padding: 10px; border-radius: 8px; }
        #pantry-map { width: 100%; height: 300px; background-color: #3d2619; position: relative; border: 2px solid #5a3a26; overflow: hidden; border-radius: 8px; }
        #player-sim { position: absolute; font-size: 32px; left: 140px; top: 200px; z-index: 10; transition: 0.1s linear; }
        .pantry-item { position: absolute; font-size: 28px; }
        .controls { display: grid; grid-template-columns: repeat(3, 50px); gap: 5px; margin-top: 10px; }
        .ctrl-btn { background: #4a2d1d; color: white; border: 1px solid #ffcc00; font-size: 20px; border-radius: 8px; height: 45px; cursor: pointer;}
    </style>
</head>
<body>
    <div id="game-container">
        <!-- PHASE 1: AVATAR STYLE -->
        <div id="screen-custom" class="screen active">
            <div class="title">Style Your Chef Sim</div>
            <div id="avatar-preview">🧑‍🍳</div>
            <div>
                <button class="btn" onclick="changeOutfit('🧑‍🍳')">Classic</button>
                <button class="btn" onclick="changeOutfit('🐱')">Cat Chef</button>
                <button class="btn" onclick="changeOutfit('🤖')">Robo Chef</button>
            </div>
            <button class="btn" style="background:#ffcc00;" onclick="goToWheel()">Lock In Look</button>
        </div>
        <!-- PHASE 2: WHEEL -->
        <div id="screen-wheel" class="screen">
            <div class="title">The Mystery Wheel</div>
            <div id="wheel-display">🎰</div>
            <button id="spin-btn" class="btn" onclick="spinWheel()">Spin for Ingredients</button>
            <div id="target-basket-ui" class="basket-box" style="display:none;"></div>
            <button id="pantry-next-btn" class="btn" style="background:#ffcc00; display:none;" onclick="goToPantry()">Enter the Pantry</button>
        </div>
        <!-- PHASE 3: TIMED PANTRY RUN -->
        <div id="screen-pantry" class="screen">
            <div class="header" style="width:100%; display:flex; justify-content:space-between; color:#ffcc00;">
                <span id="pantry-timer">⏰ Time: 20s</span>
                <span>Collected: <span id="collect-count">0</span>/4</span>
            </div>
            <div id="pantry-needed" style="font-size:14px; margin: 5px 0;">Find: </div>
            <div id="pantry-map"><div id="player-sim">🧑‍🍳</div></div>
            <div class="controls">
                <div></div><button class="ctrl-btn" onclick="moveSim(0, -25)">▲</button><div></div>
                <button class="ctrl-btn" onclick="moveSim(-25, 0)">◀</button>
                <button class="ctrl-btn" onclick="interactPantry()">🍳</button>
                <button class="ctrl-btn" onclick="moveSim(25, 0)">▶</button>
                <div></div><button class="ctrl-btn" onclick="moveSim(0, 25)">▼</button><div></div>
            </div>
        </div>
        <!-- PHASE 4: GAME OVER -->
        <div id="screen-results" class="screen">
            <div class="title" id="results-title">Round Complete</div>
            <div id="results-msg" style="text-align:center; padding: 20px;"></div>
            <button id="ad-revive-btn" class="btn" style="background:#ff3333; display:none;" onclick="watchAdRevive()">📺 Watch Ad to Get Missed Items</button>
            <button class="btn" onclick="location.reload()">Play Again</button>
        </div>
    </div>
    <script>
        let chosenAvatar='🧑‍🍳', targetIngredients=[], collectedIngredients=[], simX=140, simY=200, pantryTimer, timeRemaining=20;
        const ingredientPool=['🥩','🥦','🧅','🍄','🥕','🧀','🐟','🍅'];
        const spawnPoints=[{x:30,y:40},{x:260,y:40},{x:50,y:140},{x:240,y:140},{x:30,y:240},{x:260,y:240},{x:140,y:50},{x:140,y:120}];
        function changeOutfit(e){chosenAvatar=e;document.getElementById('avatar-preview').innerText=e;document.getElementById('player-sim').innerText=e;}
        function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
        function goToWheel(){showScreen('screen-wheel');}
        function spinWheel(){
            document.getElementById('spin-btn').disabled=true; let iterations=0;
            let interval=setInterval(()=>{
                document.getElementById('wheel-display').innerText=ingredientPool[Math.floor(Math.random()*ingredientPool.length)]; iterations++;
                if(iterations>10){
                    clearInterval(interval); while(targetIngredients.length<4){let item=ingredientPool[Math.floor(Math.random()*ingredientPool.length)];if(!targetIngredients.includes(item))targetIngredients.push(item);}
                    document.getElementById('wheel-display').style.display='none'; let b=document.getElementById('target-basket-ui'); b.style.display='flex'; b.innerText=targetIngredients.join(' '); document.getElementById('pantry-next-btn').style.display='block';
                }
            },150);
        }
        function goToPantry(){
            showScreen('screen-pantry'); document.getElementById('pantry-needed').innerText="Find: "+targetIngredients.join(' '); setupPantryMap();
            pantryTimer=setInterval(()=>{ timeRemaining--; document.getElementById('pantry-timer').innerText=`⏰ Time: ${timeRemaining}s`; if(timeRemaining<=0){clearInterval(pantryTimer);endPantryRound();} },1000);
        }
        function setupPantryMap(){
            let map=document.getElementById('pantry-map'); let itemsToSpawn=[...ingredientPool];
            spawnPoints.forEach((point,index)=>{ if(itemsToSpawn[index]){let d=document.createElement('div');d.className='pantry-item';d.id=`item-${index}`;d.innerText=itemsToSpawn[index];d.style.left=point.x+'px';d.style.top=point.y+'px';map.appendChild(d);}});
        }
        function moveSim(dx,dy){ simX=Math.max(0,Math.min(290,simX+dx)); simY=Math.max(0,Math.min(260,simY+dy)); let s=document.getElementById('player-sim'); s.style.left=simX+'px'; s.style.top=simY+'px'; }
        function interactPantry(){
            let items=document.getElementsByClassName('pantry-item');
            for(let item of items){
                let ix=parseInt(item.style.left), iy=parseInt(item.style.top);
                if(Math.abs(simX-ix)<35&&Math.abs(simY-iy)<35&&item.style.display!=='none'){
                    let food=item.innerText; if(targetIngredients.includes(food)&&!collectedIngredients.includes(food)){ collectedIngredients.push(food); item.style.display='none'; document.getElementById('collect-count').innerText=collectedIngredients.length; if(collectedIngredients.length===4){clearInterval(pantryTimer);endPantryRound();} }
                }
            }
        }
        function endPantryRound(){
            showScreen('screen-results'); let msg=document.getElementById('results-msg');
            if(collectedIngredients.length===4){ msg.innerHTML=`🎉 Success! You gathered all 4 mystery ingredients!<br><br>Ready for the Cook-Off event phase!`; }
            else{ let missedCount=4-collectedIngredients.length; msg.innerHTML=`⚠️ Out of time! You missed <b>${missedCount}</b> required ingredients.<br><br>You can watch an ad to instantly recover your stock!`; document.getElementById('ad-revive-btn').style.display='block'; }
        }
        function watchAdRevive(){ alert("📺 Simulating Reward Video Ad Playback... (30 seconds)"); collectedIngredients=[...targetIngredients]; document.getElementById('ad-revive-btn').style.display='none'; endPantryRound(); }
    </script>
</body>
</html>
